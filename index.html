<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ISA — QA Conversacional</title>
<style>
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: #e2e2de;
    --border-strong: #c8c8c4;
    --text: #1a1a18;
    --text-secondary: #6b6b67;
    --text-muted: #a0a09b;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-bg: #eff6ff;
    --accent-text: #1d4ed8;
    --success-bg: #f0fdf4;
    --success-text: #15803d;
    --success-border: #bbf7d0;
    --danger-bg: #fef2f2;
    --danger-text: #dc2626;
    --danger-border: #fecaca;
    --warning-bg: #fffbeb;
    --warning-text: #d97706;
    --warning-border: #fde68a;
    --radius: 8px;
    --mono: 'Menlo', 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 12px; height: 56px; }
  .logo { width: 28px; height: 28px; background: var(--text); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 16px; height: 16px; fill: white; }
  header h1 { font-size: 15px; font-weight: 500; }
  header span { font-size: 13px; color: var(--text-muted); margin-left: 4px; }
  .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .field input, .field textarea { font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; width: 100%; outline: none; transition: border-color .15s; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .preset-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .preset-btn { font-size: 12px; font-family: inherit; padding: 5px 14px; border-radius: 20px; cursor: pointer; background: var(--surface); border: 1px solid var(--border-strong); color: var(--text-secondary); transition: all .15s; }
  .preset-btn:hover { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
  .preset-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .actions { display: flex; align-items: center; gap: 14px; }
  .btn-run { font-family: inherit; font-size: 14px; font-weight: 500; background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 10px 22px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .15s; }
  .btn-run:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { font-family: inherit; font-size: 13px; font-weight: 500; background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
  .btn-secondary:hover { background: var(--bg); }
  .timer { font-size: 13px; color: var(--text-muted); display: none; }
  .status-box { border-radius: 10px; padding: 14px 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .status-idle { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); }
  .status-running { background: var(--warning-bg); border: 1px solid var(--warning-border); color: var(--warning-text); }
  .status-ok { background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success-text); }
  .status-err { background: var(--danger-bg); border: 1px solid var(--danger-border); color: var(--danger-text); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-idle { background: var(--text-muted); }
  .dot-run { background: var(--warning-text); animation: pulse 1.2s infinite; }
  .dot-ok { background: var(--success-text); }
  .dot-err { background: var(--danger-text); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .metric { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
  .metric-val { font-size: 22px; font-weight: 600; }
  .metric-val.ok { color: var(--success-text); }
  .metric-val.err { color: var(--danger-text); }
  .transcript-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .transcript-header h3 { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .transcript-box { background: #1a1a1a; border-radius: 10px; padding: 1.25rem; font-size: 12.5px; font-family: var(--mono); line-height: 1.8; color: #d4d4d4; max-height: 480px; overflow-y: auto; }
  .turn-block { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #2a2a2a; }
  .turn-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .turn-header { color: #9cdcfe; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .sim-line { color: #ce9178; margin-bottom: 4px; }
  .avatar-line { color: #b5cea8; }
  .result-area { display: none; flex-direction: column; gap: 16px; }
  hr { border: none; border-top: 1px solid var(--border); }
  @media (max-width: 600px) { .grid2, .grid3 { grid-template-columns: 1fr; } .metrics { grid-template-columns: 1fr; } .main { padding: 1rem 1rem 3rem; } }

  @media print {
    header, .actions, .btn-secondary, hr, .card:not(.print-card) { display: none !important; }
    body { background: white; }
    .main { padding: 0; max-width: 100%; }
    .transcript-box { max-height: none; background: white; color: black; border: 1px solid #ccc; }
    .turn-header { color: #1a6aaa; }
    .sim-line { color: #b84c00; }
    .avatar-line { color: #2a7a2a; }
    .turn-block { border-bottom: 1px solid #eee; }
    .result-area { display: flex !important; }
    .status-box { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
  </div>
  <h1>ISA — QA Conversacional</h1>
  <span>Tolky</span>
</header>

<div class="main">

  <div>
    <div class="section-label">Cenários salvos</div>
    <div class="preset-row" id="preset-row"></div>
  </div>

  <hr />

  <div>
    <div class="section-label">Avatar</div>
    <div class="card">
      <div class="grid3">
        <div class="field">
          <label>Host slug</label>
          <input type="text" id="host_slug" value="us" />
        </div>
        <div class="field">
          <label>Sub slug <span style="font-weight:400;color:var(--text-muted)">(opcional)</span></label>
          <input type="text" id="sub_slug" value="vagas" />
        </div>
        <div class="field">
          <label>Máx. turnos</label>
          <input type="number" id="max_turnos" value="20" min="3" max="60" />
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label>Host token</label>
          <input type="password" id="host_token" value="J0AsPSblS1pCJmuLJsS1SJM9dMUvR0DNWnqvY6OEiqS" autocomplete="off" />
        </div>
        <div class="field">
          <label>Host ID</label>
          <input type="text" id="host_id" value="a0060f6f-9c1a-46c3-8f88-c190117fba2f" />
        </div>
      </div>
      <div class="field">
        <label>Saudação inicial</label>
        <input type="text" id="saudacao" value="Olá! Vi a vaga de QA Junior e tenho interesse em me candidatar." />
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">Teste</div>
    <div class="card">
      <div class="field">
        <label>Cenário — descreva quem é o candidato simulado e como ele se comporta</label>
        <textarea id="cenario" rows="4">Você é Carlos Eduardo Mendes, 24 anos, de Belo Horizonte/MG. Tem interesse na vaga de QA Junior. É cooperativo: fornece todos os dados solicitados (nome, telefone, e-mail, cidade, estado, LinkedIn) sem hesitar. Seu objetivo é completar o processo de candidatura.</textarea>
      </div>
      <div class="field">
        <label>Critério de sucesso — o que define que o fluxo funcionou corretamente</label>
        <textarea id="criterio" rows="2">O avatar informar que entrará em contato via WhatsApp ou mensagem similar de encerramento positivo da candidatura.</textarea>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">Configuração</div>
    <div class="card">
      <div class="field">
        <label>URL do webhook PAI (n8n)</label>
        <input type="text" id="webhook_url" value="https://n8n-service.tolky.to/webhook/qa-conversacional-pai" />
        <div class="hint">O workflow PAI precisa estar ativo no n8n para receber as chamadas.</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-run" id="btn-run" onclick="runTest()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Iniciar teste
    </button>
    <span class="timer" id="timer">0:00 em execução</span>
  </div>

  <div class="status-box status-idle" id="status-box">
    <div class="dot dot-idle" id="dot"></div>
    <span id="status-msg">Preencha as configurações e clique em iniciar.</span>
  </div>

  <div class="result-area" id="result-area">
    <div class="metrics" id="metrics"></div>
    <div>
      <div class="transcript-header">
        <h3>Transcrição da conversa</h3>
        <button class="btn-secondary" onclick="exportPDF()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3m0 12l-4-4m4 4l4-4M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17"/></svg>
          Exportar PDF
        </button>
      </div>
      <div class="transcript-box" id="transcript-box"></div>
    </div>
  </div>

</div>

<script>
const PRESETS = [
  {
    label: "QA Junior — ideal",
    host_slug: "us", sub_slug: "vagas", max_turnos: 20,
    saudacao: "Olá! Vi a vaga de QA Junior e tenho interesse em me candidatar.",
    cenario: "Você é Carlos Eduardo Mendes, 24 anos, de Belo Horizonte/MG. Tem interesse na vaga de QA Junior. É cooperativo: fornece todos os dados solicitados (nome, telefone, e-mail, cidade, estado, LinkedIn) sem hesitar. Seu objetivo é completar o processo de candidatura.",
    criterio: "O avatar informar que entrará em contato via WhatsApp ou mensagem similar de encerramento positivo da candidatura."
  },
  {
    label: "QA Junior — resistente",
    host_slug: "us", sub_slug: "vagas", max_turnos: 20,
    saudacao: "Oi, vi a vaga de QA Junior. Quero saber mais antes de me candidatar.",
    cenario: "Você é um candidato interessado na vaga de QA Junior, porém desconfiado e resistente. Quando o avatar pedir dados pessoais, reaja com evasivas: pergunte por que precisa, diga que prefere não informar por enquanto. Pode ceder após insistência, mas sempre com relutância.",
    criterio: "O avatar conseguir contornar a resistência e encerrar com mensagem de contato via WhatsApp, OU demonstrar que não conseguiu avançar após múltiplas tentativas."
  },
  {
    label: "Suporte ao cliente — ideal",
    host_slug: "us", sub_slug: "vagas", max_turnos: 20,
    saudacao: "Olá! Tenho interesse na vaga de Suporte ao Cliente.",
    cenario: "Você é Ana Paula Rodrigues, 27 anos, de São Paulo/SP. Tem 2 anos de experiência em atendimento ao cliente. É comunicativa e paciente. Fornece todos os dados pedidos prontamente. Seu objetivo é completar a candidatura para Suporte ao Cliente.",
    criterio: "O avatar informar que entrará em contato via WhatsApp ou mensagem similar de encerramento positivo da candidatura."
  },
  {
    label: "Suporte ao cliente — sem experiência",
    host_slug: "us", sub_slug: "vagas", max_turnos: 20,
    saudacao: "Oi! Quero me candidatar para a vaga de Suporte ao Cliente.",
    cenario: "Você é Lucas Ferreira, 20 anos, de Curitiba/PR. Não tem experiência formal em suporte, só estágios em administração. Quando perguntado sobre experiência, admite honestamente que não tem, mas enfatiza que aprende rápido e está motivado. Fornece dados normalmente.",
    criterio: "O avatar informar que entrará em contato via WhatsApp mesmo sem experiência, OU informar educadamente que o perfil não se encaixa."
  }
];

let timerInterval = null;
let lastResult = null;

function g(id) { return document.getElementById(id); }

function setStatus(type, msg) {
  g('status-box').className = 'status-box status-' + type;
  g('dot').className = 'dot dot-' + { idle:'idle', running:'run', ok:'ok', err:'err' }[type];
  g('status-msg').textContent = msg;
}

function startTimer() {
  const el = g('timer');
  el.style.display = 'inline';
  let secs = 0;
  timerInterval = setInterval(() => {
    secs++;
    const m = Math.floor(secs / 60), s = secs % 60;
    el.textContent = m + ':' + s.toString().padStart(2,'0') + ' em execução';
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  g('timer').style.display = 'none';
}

function applyPreset(i) {
  const p = PRESETS[i];
  g('host_slug').value = p.host_slug;
  g('sub_slug').value = p.sub_slug;
  g('max_turnos').value = p.max_turnos;
  g('saudacao').value = p.saudacao;
  g('cenario').value = p.cenario;
  g('criterio').value = p.criterio;
  document.querySelectorAll('.preset-btn').forEach((b, j) => b.classList.toggle('active', j === i));
}

function buildTranscript(log) {
  return log.map(t => {
    const div = document.createElement('div');
    div.className = 'turn-block';
    div.innerHTML =
      '<div class="turn-header">Turno ' + t.turno + '</div>' +
      '<div class="sim-line">Simulador: ' + (t.enviado || '') + '</div>' +
      '<div class="avatar-line">Avatar: ' + (t.resposta_avatar || '(sem resposta)') + '</div>';
    return div.outerHTML;
  }).join('');
}

function exportPDF() {
  if (!lastResult) return;
  const d = lastResult;
  const cenario = g('cenario').value;
  const criterio = g('criterio').value;

  const win = window.open('', '_blank');
  const rows = (d.transcricao || []).map(t =>
    '<div class="turn-block">' +
    '<div class="turn-header">Turno ' + t.turno + '</div>' +
    '<div class="sim-line"><strong>Simulador:</strong> ' + (t.enviado || '') + '</div>' +
    '<div class="avatar-line"><strong>Avatar:</strong> ' + (t.resposta_avatar || '(sem resposta)') + '</div>' +
    '</div>'
  ).join('');

  win.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
  <title>Relatório QA — ISA</title>
  <style>
    body { font-family: Arial, sans-serif; font-size: 13px; color: #1a1a18; max-width: 780px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #6b6b67; font-size: 13px; margin-bottom: 1.5rem; }
    .meta-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 1.5rem; }
    .meta-box { border: 1px solid #e2e2de; border-radius: 8px; padding: 10px 14px; }
    .meta-label { font-size: 10px; color: #a0a09b; text-transform: uppercase; letter-spacing: 0.06em; }
    .meta-val { font-size: 18px; font-weight: 700; margin-top: 2px; }
    .meta-val.ok { color: #15803d; }
    .meta-val.err { color: #dc2626; }
    .info-box { background: #f5f5f3; border-radius: 8px; padding: 12px 16px; margin-bottom: 1.5rem; font-size: 12px; line-height: 1.6; }
    .info-box strong { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #a0a09b; margin-bottom: 4px; }
    h2 { font-size: 13px; font-weight: 600; color: #6b6b67; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; border-top: 1px solid #e2e2de; padding-top: 1rem; }
    .turn-block { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #f0f0ee; }
    .turn-block:last-child { border-bottom: none; }
    .turn-header { font-size: 10px; font-weight: 700; color: #2563eb; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
    .sim-line { color: #92400e; margin-bottom: 3px; }
    .avatar-line { color: #166534; }
    .footer { margin-top: 2rem; font-size: 11px; color: #a0a09b; border-top: 1px solid #e2e2de; padding-top: 1rem; }
    @media print { body { padding: 1rem; } }
  </style></head><body>
  <h1>Relatório de QA — ISA</h1>
  <div class="subtitle">Gerado em ${new Date().toLocaleString('pt-BR')}</div>
  <div class="meta-grid">
    <div class="meta-box"><div class="meta-label">Resultado</div><div class="meta-val ${d.resultado === 'SUCESSO' ? 'ok' : 'err'}">${d.resultado || '—'}</div></div>
    <div class="meta-box"><div class="meta-label">Turnos</div><div class="meta-val">${d.total_turnos || 0} / ${d.max_turnos || 20}</div></div>
    <div class="meta-box"><div class="meta-label">Tempo</div><div class="meta-val">${d.tempo_segundos || 0}s</div></div>
  </div>
  <div class="info-box"><strong>Cenário</strong>${cenario}</div>
  <div class="info-box"><strong>Critério de sucesso</strong>${criterio}</div>
  <div class="info-box"><strong>Motivo do encerramento</strong>${d.motivo_encerramento || '—'}</div>
  <h2>Transcrição da conversa</h2>
  ${rows}
  <div class="footer">ISA — QA Conversacional · Tolky · conversation_id: ${d.conversation_id || '—'}</div>
  </body></html>`);
  win.document.close();
  setTimeout(() => win.print(), 400);
}

async function runTest() {
  const webhookUrl = g('webhook_url').value.trim();
  const hostToken = g('host_token').value.trim();
  const hostId = g('host_id').value.trim();
  const hostSlug = g('host_slug').value.trim();
  const subSlug = g('sub_slug').value.trim();
  const maxTurnos = parseInt(g('max_turnos').value) || 20;
  const saudacao = g('saudacao').value.trim();
  const cenario = g('cenario').value.trim();
  const criterio = g('criterio').value.trim();

  if (!webhookUrl) { setStatus('err', 'Informe a URL do webhook PAI.'); return; }
  if (!cenario) { setStatus('err', 'Descreva o cenário do teste.'); return; }
  if (!criterio) { setStatus('err', 'Defina o critério de sucesso.'); return; }

  g('btn-run').disabled = true;
  g('result-area').style.display = 'none';
  setStatus('running', 'Teste em andamento — a conversa está sendo simulada. Isso pode levar alguns minutos...');
  startTimer();

  const payload = {
    config: { host_slug: hostSlug, host_token: hostToken, host_id: hostId, max_turnos: maxTurnos, saudacao_inicial: saudacao },
    cenario, criterio_sucesso: criterio
  };
  if (subSlug) payload.config.sub_slug = subSlug;

  try {
    const res = await fetch(webhookUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + res.statusText);
    const data = await res.json();
    stopTimer();
    g('btn-run').disabled = false;
    lastResult = data;

    const sucesso = data.resultado === 'SUCESSO';
    setStatus(sucesso ? 'ok' : 'err',
      sucesso
        ? 'Teste concluído com sucesso em ' + data.total_turnos + ' turnos (' + data.tempo_segundos + 's).'
        : 'Falha: ' + (data.motivo_encerramento || 'Não concluído')
    );

    g('metrics').innerHTML =
      '<div class="metric"><div class="metric-label">Resultado</div><div class="metric-val ' + (sucesso?'ok':'err') + '">' + (data.resultado||'—') + '</div></div>' +
      '<div class="metric"><div class="metric-label">Turnos</div><div class="metric-val">' + (data.total_turnos||0) + '<span style="font-size:14px;font-weight:400;color:var(--text-muted)"> / ' + (data.max_turnos||maxTurnos) + '</span></div></div>' +
      '<div class="metric"><div class="metric-label">Tempo</div><div class="metric-val">' + (data.tempo_segundos||0) + '<span style="font-size:14px;font-weight:400;color:var(--text-muted)">s</span></div></div>';

    if (data.transcricao && data.transcricao.length) {
      g('transcript-box').innerHTML = buildTranscript(data.transcricao);
    } else {
      g('transcript-box').innerHTML = '<span style="color:#6b6b67">Nenhuma mensagem registrada.</span>';
    }

    g('result-area').style.display = 'flex';

  } catch(e) {
    stopTimer();
    g('btn-run').disabled = false;
    setStatus('err', 'Erro ao chamar o webhook: ' + e.message + '. Verifique se o PAI está ativo no n8n e se a URL está correta.');
  }
}

(function init() {
  const row = g('preset-row');
  PRESETS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.label;
    btn.onclick = () => applyPreset(i);
    row.appendChild(btn);
  });
})();
</script>
</body>
</html>
